name: Backend CI/CD

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend.yml"]
  pull_request:
    branches: [main]
    paths: ["backend/**"]

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Import sanity check
        run: python -c "from app import create_app; create_app(); print('App factory OK')"
        env:
          FLASK_ENV: testing
          DATABASE_URL: "sqlite:///:memory:"
          JWT_SECRET_KEY: "ci-test-secret"
          SUPABASE_URL: "https://example.supabase.co"
          SUPABASE_SERVICE_ROLE_KEY: "ci-test-key"
          MAIL_USERNAME: "ci@example.com"
          MAIL_PASSWORD: "ci-test-password"

  deploy:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -fsS -X POST "https://api.render.com/deploy/${{ secrets.RENDER_SERVICE_ID }}?key=${{ secrets.RENDER_DEPLOY_KEY }}"
