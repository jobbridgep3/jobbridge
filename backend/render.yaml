services:
  - type: web
    name: jobbridge-backend
    runtime: python
    plan: free
    region: singapore
    branch: main
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python -m spacy download en_core_web_sm && flask db upgrade"
    startCommand: "python run.py --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app"
    healthCheckPath: /api/health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      # The following must be set manually in the Render dashboard (never committed):
      # DATABASE_URL, JWT_SECRET_KEY, SECRET_KEY, SUPABASE_URL, SUPABASE_ANON_KEY,
      # SUPABASE_SERVICE_ROLE_KEY, SUPABASE_STORAGE_BUCKET, BREVO_API_KEY,
      # BREVO_SENDER_EMAIL, BREVO_SENDER_NAME, CORS_ORIGINS (set to the deployed Vercel
      # URL), GOOGLE_APPLICATION_CREDENTIALS_JSON, DIALOGFLOW_PROJECT_ID, ADMIN_SEED_EMAIL,
      # ADMIN_SEED_PASSWORD
      #
      # GOOGLE_APPLICATION_CREDENTIALS_JSON: base64-encoded contents of the Vision
      # service-account JSON key (GOOGLE_APPLICATION_CREDENTIALS, the file-path form, only
      # works in local dev — Render builds from a fresh git clone with no way to place a
      # git-ignored key file on disk). Generate the value with:
      #   PowerShell: [Convert]::ToBase64String([IO.File]::ReadAllBytes("backend/credentials/google-vision-service-account.json"))
      #   bash:       base64 -w0 backend/credentials/google-vision-service-account.json
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
      - key: DIALOGFLOW_PROJECT_ID
        sync: false
