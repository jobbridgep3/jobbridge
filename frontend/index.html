<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/peso-logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="JobBridge — Intelligent Job Matching & Employment Monitoring System for PESO Pila, Laguna" />
    <meta name="theme-color" content="#1e3a8a" />
    <title>JobBridge — PESO Pila, Laguna</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('jobbridge-theme')
          var resolved =
            stored === 'dark' || stored === 'light'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light'
          document.documentElement.classList.toggle('dark', resolved === 'dark')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
